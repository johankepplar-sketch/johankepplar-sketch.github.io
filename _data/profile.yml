short_bio: >-
  <p>
    I am an <strong>early-stage researcher</strong> navigating the academic landscape, with core interests in <strong>Temporal Causal Reasoning</strong>, <strong>Scene Graph Generation</strong>, and <strong>3D Vision</strong>. I am driven by the challenge of teaching machines to go beyond surface-level perception&mdash;enabling them to understand how events unfold, why objects interact, and how structured representations can enhance the reliability of visual reasoning. My current status is simple: <strong>sprinting toward AAAI</strong>. Looking further ahead, my ambition is to establish a rigorous, high-impact research rhythm to become a <strong>"5 CCF-A per year" researcher</strong>. Beyond the lab, my personality occasionally oscillates between INFP and ENFJ, and I am a huge fan of <strong>Joker Xue</strong>.
  </p>

