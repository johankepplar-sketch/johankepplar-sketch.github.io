short_bio: >-
  <p>
    I am a Ph.D. student in Computer Science at Xi'an Jiaotong University. My research focuses on building visual reasoning systems that can understand dynamic scenes through temporal structure, causal relations, and explicit scene representations. I am especially interested in how machines can move beyond recognizing isolated objects and learn to reason about events, interactions, and spatial-temporal changes in a more structured and interpretable way.
  </p>
  <ul class="mb-0">
    <li><strong>Temporal Causal Reasoning:</strong> modeling how events evolve over time and how causal dependencies shape visual understanding.</li>
    <li><strong>Scene Graph Generation:</strong> extracting object-relation structures that support compositional reasoning and downstream decision making.</li>
    <li><strong>3D Vision:</strong> connecting visual perception with spatial structure for robust scene understanding.</li>
    <li><strong>Research Goal:</strong> developing interpretable, generalizable, and publication-quality methods for complex visual reasoning tasks.</li>
  </ul>
